# Spring Boot Application Configuration
spring.application.name=quantity_measurement_app

# MySQL Database Configuration
spring.datasource.url=jdbc:mysql://localhost:3306/qma
spring.datasource.username=root
spring.datasource.password=M@hi2304
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

# JPA Hibernate Configuration
spring.jpa.database-platform=org.hibernate.dialect.MySQL8Dialect
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.format_sql=true
spring.jpa.properties.hibernate.use_sql_comments=true

# Logging Configuration
logging.level.root=INFO
logging.level.com.example.quantity_measurement_app=DEBUG
logging.level.org.springframework.web=DEBUG
logging.level.org.hibernate.SQL=DEBUG
logging.level.org.hibernate.type.descriptor.sql.BasicBinder=TRACE

# Server Configuration
server.port=8080
server.servlet.context-path=/api

# Application Configuration
app.name=Quantity Measurement Application
app.version=1.0.0
