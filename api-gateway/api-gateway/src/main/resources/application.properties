server.port=${PORT:10000}
spring.application.name=api-gateway

# ? Register with Eureka
eureka.client.service-url.defaultZone=http://localhost:8761/eureka/
eureka.client.register-with-eureka=true
eureka.client.fetch-registry=true
eureka.instance.prefer-ip-address=true

# ? Auto discover services from Eureka
spring.cloud.gateway.discovery.locator.enabled=true
spring.cloud.gateway.discovery.locator.lower-case-service-id=true

# ? Auth service routes - OAuth2 login flow
spring.cloud.gateway.routes[0].id=auth-service-oauth2
spring.cloud.gateway.routes[0].uri=lb://AUTH-SERVICE
spring.cloud.gateway.routes[0].predicates[0]=Path=/oauth2/**

spring.cloud.gateway.routes[1].id=auth-service-login
spring.cloud.gateway.routes[1].uri=lb://AUTH-SERVICE
spring.cloud.gateway.routes[1].predicates[0]=Path=/login/**

spring.cloud.gateway.routes[2].id=auth-service
spring.cloud.gateway.routes[2].uri=lb://AUTH-SERVICE
spring.cloud.gateway.routes[2].predicates[0]=Path=/auth/**

# ? User service routes
spring.cloud.gateway.routes[3].id=user-service
spring.cloud.gateway.routes[3].uri=lb://USER-SERVICE
spring.cloud.gateway.routes[3].predicates[0]=Path=/users/**

# ? Measurement service routes
spring.cloud.gateway.routes[4].id=measurement-service
spring.cloud.gateway.routes[4].uri=lb://MEASUREMENT-SERVICE
spring.cloud.gateway.routes[4].predicates[0]=Path=/measurements/**

spring.cloud.gateway.routes[5].id=measurement-service-api-prefix
spring.cloud.gateway.routes[5].uri=lb://MEASUREMENT-SERVICE
spring.cloud.gateway.routes[5].predicates[0]=Path=/api/measurements/**
spring.cloud.gateway.routes[5].filters[0]=StripPrefix=1

# ? Actuator
management.endpoints.web.exposure.include=health,info,gateway
management.endpoint.gateway.enabled=true

logging.level.org.springframework.cloud.gateway=DEBUG
logging.level.reactor.netty=INFO
# ? CORS configuration for API Gateway
spring.cloud.gateway.globalcors.cors-configurations.[/**].allowed-origins=http://localhost:4200
spring.cloud.gateway.globalcors.cors-configurations.[/**].allowed-methods=GET,POST,PUT,DELETE,OPTIONS,PATCH
spring.cloud.gateway.globalcors.cors-configurations.[/**].allowed-headers=*
spring.cloud.gateway.globalcors.cors-configurations.[/**].allow-credentials=true
spring.cloud.gateway.globalcors.cors-configurations.[/**].max-age=3600
